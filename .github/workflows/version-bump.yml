name: Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'

jobs:
  bump:
    # Skip the commit the action itself creates
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump_type
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qi '\[major\]'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qi '\[minor\]'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version in plugin files
        id: version
        run: |
          CURRENT=$(jq -r '.version' plugins/sdw/.claude-plugin/plugin.json)
          IFS='.' read -r major minor patch <<< "$CURRENT"

          case "${{ steps.bump_type.outputs.type }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac

          NEW="$major.$minor.$patch"
          echo "new=$NEW" >> $GITHUB_OUTPUT

          # Update plugin.json
          jq --arg v "$NEW" '.version = $v' \
            plugins/sdw/.claude-plugin/plugin.json > tmp.json \
            && mv tmp.json plugins/sdw/.claude-plugin/plugin.json

          # Update marketplace.json (version lives inside the plugins array entry)
          jq --arg v "$NEW" \
            '(.plugins[] | select(.name == "sdw")).version = $v' \
            .claude-plugin/marketplace.json > tmp.json \
            && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/sdw/.claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main --tags
